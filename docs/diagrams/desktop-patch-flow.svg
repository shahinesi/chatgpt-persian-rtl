<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1600 840" role="img" aria-labelledby="title desc">
  <title id="title">Desktop Patch Flow</title>
  <desc id="desc">Hand drawn desktop patch flow for ChatGPT app.asar on macOS and Windows.</desc>
  <style>
    .hand { font-family: "Comic Sans MS", "Trebuchet MS", cursive, sans-serif; }
    .box { fill: #eef2f6; stroke: #202124; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .green { fill: #d9fbe1; stroke: #2ea44f; }
    .purple { fill: #eadcff; stroke: #6842d9; }
    .orange { fill: #fff1cf; stroke: #d9822b; }
    .blue { fill: #d9ecff; stroke: #1976d2; }
    .arrow { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="1600" height="840" fill="#fff"/>
  <text x="800" y="70" class="hand" text-anchor="middle" font-size="56" font-weight="700" fill="#202124">Desktop app.asar Patch Flow</text>

  <rect x="85" y="150" width="285" height="110" rx="18" class="box"/>
  <text x="228" y="195" class="hand" text-anchor="middle" font-size="28" fill="#202124">Find ChatGPT</text>
  <text x="228" y="236" class="hand" text-anchor="middle" font-size="22" fill="#59636e">macOS / Windows</text>

  <path d="M380 205 L485 205" class="arrow" stroke="#6842d9"/>
  <path d="M455 182 L490 205 L455 228" class="arrow" stroke="#6842d9"/>
  <rect x="505" y="150" width="285" height="110" rx="18" class="box purple"/>
