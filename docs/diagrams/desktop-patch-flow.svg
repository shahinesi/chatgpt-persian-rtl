  <text x="648" y="236" class="hand" text-anchor="middle" font-size="22" fill="#59636e">app.asar.bak</text>

  <path d="M800 205 L905 205" class="arrow" stroke="#6842d9"/>
  <path d="M875 182 L910 205 L875 228" class="arrow" stroke="#6842d9"/>
  <rect x="925" y="150" width="285" height="110" rx="18" class="box orange"/>
  <text x="1068" y="195" class="hand" text-anchor="middle" font-size="28" fill="#d9822b">Extract</text>
  <text x="1068" y="236" class="hand" text-anchor="middle" font-size="22" fill="#59636e">@electron/asar</text>

  <path d="M1220 205 L1325 205" class="arrow" stroke="#2ea44f"/>
  <path d="M1295 182 L1330 205 L1295 228" class="arrow" stroke="#2ea44f"/>
  <rect x="1345" y="150" width="190" height="110" rx="18" class="box green"/>
  <text x="1440" y="195" class="hand" text-anchor="middle" font-size="28" fill="#2ea44f">Inject</text>
  <text x="1440" y="236" class="hand" text-anchor="middle" font-size="22" fill="#59636e">RTL + font</text>

  <path d="M1440 275 C1440 340 1280 375 1180 410" class="arrow" stroke="#2ea44f"/>
  <path d="M1214 413 L1174 412 L1201 382" class="arrow" stroke="#2ea44f"/>
  <rect x="900" y="425" width="390" height="125" rx="22" class="box blue"/>
  <text x="1095" y="476" class="hand" text-anchor="middle" font-size="31" fill="#1976d2">Repack app.asar</text>
  <text x="1095" y="520" class="hand" text-anchor="middle" font-size="23" fill="#59636e">native modules preserved</text>

  <path d="M890 490 L780 490" class="arrow" stroke="#1976d2"/>
  <path d="M810 467 L775 490 L810 513" class="arrow" stroke="#1976d2"/>
  <rect x="435" y="425" width="310" height="125" rx="22" class="box purple"/>
  <text x="590" y="476" class="hand" text-anchor="middle" font-size="31" fill="#6842d9">macOS Fix</text>
  <text x="590" y="520" class="hand" text-anchor="middle" font-size="23" fill="#59636e">Info.plist + xattr</text>

  <path d="M590 570 C640 635 745 650 785 670" class="arrow" stroke="#2ea44f"/>
  <path d="M1095 570 C1045 635 885 650 815 670" class="arrow" stroke="#2ea44f"/>
  <rect x="430" y="680" width="740" height="76" rx="18" class="box green"/>
  <text x="800" y="729" class="hand" text-anchor="middle" font-size="34" font-weight="700" fill="#2ea44f">Restart ChatGPT · Persian reads correctly</text>
