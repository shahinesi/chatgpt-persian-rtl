name: درخواست قابلیت
description: پیشنهاد یک بهبود مشخص برای نسخه وب یا دسکتاپ
title: "[قابلیت]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: target
    attributes:
      label: بخش مرتبط
      options:
        - افزونه کروم / وب
        - دسکتاپ macOS
        - دسکتاپ Windows
        - مستندات
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: مسئله یا کاربرد
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: راه‌حل پیشنهادی
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: محدودیت‌های محدوده
      options:
        - label: پیشنهاد، چیدمان و کنترل‌های اصلی ChatGPT را بی‌دلیل تغییر نمی‌دهد.
          required: true
        - label: پیشنهاد به مجوز غیرضروری، رهگیری یا کد راه‌دور نیاز ندارد.
          required: true
