name: گزارش باگ
description: گزارش مشکل RTL، LTR، چیدمان یا سازگاری
title: "[باگ]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: لطفا محتوای خصوصی گفتگوها را از screenshot و نمونه‌ها حذف کنید.
  - type: input
    id: version
    attributes:
      label: نسخه پروژه
      placeholder: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: بخش مرتبط
      options:
        - افزونه کروم / وب
        - دسکتاپ macOS
        - دسکتاپ Windows
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: مشکل
      description: چه اتفاقی افتاد و انتظار چه رفتاری داشتید؟
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: مراحل بازتولید
      placeholder: |
        1. باز کنید ...
        2. تایپ کنید ...
        3. مشاهده کنید ...
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: نمونه متن حداقلی
      description: از نمونه غیرحساس استفاده کنید که مشکل جهت متن را بازتولید کند.
  - type: checkboxes
    id: scope
    attributes:
      label: بررسی محدوده
      options:
        - label: مشکل به متن پیام، کادر نوشتن یا patch دسکتاپ مربوط است و درخواست راست‌چین کردن کل رابط ChatGPT نیست.
          required: true
