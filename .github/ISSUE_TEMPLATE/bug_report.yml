name: Bug report
description: Report an RTL, LTR, layout or compatibility problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a problem. Please remove private conversation content from screenshots and examples.
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Google Chrome
        - Microsoft Edge
        - Other Chromium-based browser
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Type ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal text sample
      description: Use a non-sensitive example that reproduces the direction issue.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: The issue affects message text or the composer, not a request to RTL the entire ChatGPT interface.
          required: true
