name: Validate extension

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate source and manifest
        run: npm test

      - name: Build extension package
        run: npm run build

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-persian-rtl
          path: chrome-plugin/dist/*.zip
          if-no-files-found: error
